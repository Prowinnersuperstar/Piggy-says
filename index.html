<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Says</title>
    <style>
        :root {
            --primary: #8B00FF;
            --accent: #FF00AA;
            --sidebar-bg: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
        }

        /* Computer Sidebar */
        .sidebar {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--sidebar-bg);
            padding: 30px 20px;
            border-right: 1px solid #333;
            z-index: 1100;
        }

        .sidebar .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar .logo-area img {
            width: 140px;
            height: auto;
            border-radius: 12px;
            border: 3px solid var(--accent);
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            color: #aaa;
        }

        .sidebar-nav li:hover {
            background: #252525;
            color: white;
        }

        .sidebar-nav li.active {
            background: var(--primary);
            color: white;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #6a00cc);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 0, 255, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo img {
            width: 80px;
            height: auto;
            border-radius: 8px;
            border: 4px solid white;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .subtitle {
            color: #ffccff;
            font-size: 1.1rem;
        }

        main {
            padding: 20px;
            min-height: calc(100vh - 180px);
        }

        .section {
            display: none;
            padding: 20px 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .section.active {
            display: block;
        }

        .empty-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.1rem;
            border: 2px dashed #444;
            border-radius: 16px;
            margin: 20px 0;
        }

        /* YouTube Section */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            border: 3px solid var(--accent);
            box-shadow: 0 10px 30px rgba(255, 0, 170, 0.4);
            margin: 20px 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .yt-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #FF0000;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .yt-btn:hover { transform: scale(1.08); background: #cc0000; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.97);
            backdrop-filter: blur(10px);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 4px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #aaa;
            font-size: 0.85rem;
            padding: 6px;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .sidebar { display: block; }
            main, header { margin-left: 260px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <img src="image_7663df.png" alt="Logo">
        </div>
        <ul class="sidebar-nav">
            <li class="active" data-tab="home"><span>🏠</span> Home</li>
            <li data-tab="events"><span>🎉</span> Events</li>
            <li data-tab="youtube"><span>📺</span> YouTube</li>
        </ul>
    </nav>

    <header>
        <div class="logo">
            <img src="image_7663df.png" alt="Logo">
            <h1>Piggy Says</h1>
        </div>
        <p class="subtitle">sub!</p>
    </header>

    <main>
        <section id="home" class="section active">
            ## Welcome to Piggy Says! 🐷
            <div class="empty-placeholder">Main content coming soon...</div>
        </section>

        <section id="events" class="section">
            ## Upcoming Events 🎉
            <div class="empty-placeholder">Event schedule coming soon!</div>
        </section>

        <section id="youtube" class="section" style="text-align: center;">
            ## Watch Piggy on YouTube
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/https://www.youtube.com/watch?v=3Zb3smwT-dk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <a href="https://youtube.com/@PagPagsays" class="yt-btn" target="_blank">▶️ Subscribe to @PagPagsays</a>
            <p>Join the fun — new videos dropping regularly!</p>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="home"><span>🏠</span>Home</div>
        <div class="nav-item" data-tab="events"><span>🎉</span>Events</div>
        <div class="nav-item" data-tab="youtube"><span>📺</span>YouTube</div>
    </nav>

    <script>
        const navItems = document.querySelectorAll('.nav-item, .sidebar-nav li');
        const sections = document.querySelectorAll('.section');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.getAttribute('data-tab');
                navItems.forEach(n => n.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                
                document.querySelectorAll(`[data-tab="${tab}"]`).forEach(n => n.classList.add('active'));
                document.getElementById(tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
