<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piggy Says</title>
<style>
  /* Basic styles for layout and visibility */
  body {
    display: flex;
    flex-direction: row;
    font-family: Arial, sans-serif;
    margin: 0;
  }

  .sidebar {
    width: 260px;
    background: #222;
    padding: 10px;
  }

  .sidebar .sidebar-nav-item {
    display: block;
    padding: 10px;
    color: #aaa;
    cursor: pointer;
  }

  .sidebar .sidebar-nav-item.active {
    background: #555;
    color: #fff;
  }

  main {
    flex: 1;
    padding: 20px;
  }

  .section {
    display: none;
  }

  .section.active {
    display: block;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-nav-item active" data-tab="home">Home</div>
  <div class="sidebar-nav-item" data-tab="events">Events</div>
  <div class="sidebar-nav-item" data-tab="youtube">YouTube</div>
</div>

<main>
  <section id="home" class="section active">
    <h2>Home</h2>
    <p>Welcome to Piggy Says!</p>
  </section>
  <section id="events" class="section">
    <h2>Events</h2>
    <p>Upcoming events will be listed here.</p>
  </section>
  <section id="youtube" class="section">
    <h2>YouTube</h2>
    <p>Watch Piggy on YouTube.</p>
  </section>
</main>

<script>
  document.querySelectorAll('.sidebar .sidebar-nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const tab = item.getAttribute('data-tab');

      document.querySelectorAll('.sidebar .sidebar-nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');

      document.querySelectorAll('.section').forEach(section => {
        section.classList.toggle('active', section.id === tab);
      });
    });
  });
</script>

</body>
</html>
